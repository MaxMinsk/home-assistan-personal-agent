configuration:
  telegram_bot_token:
    name: Telegram bot token
    description: Bot token from BotFather.
  allowed_telegram_user_ids:
    name: Allowed Telegram user IDs
    description: Comma-separated Telegram user IDs that can talk to the assistant.
  reasoning_preview_enabled:
    name: Reasoning preview in Telegram
    description: Shows temporary reasoning preview while the model is thinking and removes it after the final answer.
  reasoning_preview_delay_seconds:
    name: Reasoning preview delay (sec)
    description: Show reasoning preview only if response generation takes longer than this threshold.
  ha_url:
    name: Home Assistant URL
    description: Home Assistant Core API proxy URL.
  ha_long_lived_access_token:
    name: Home Assistant long-lived access token
    description: Token for Home Assistant MCP access.
  mcp_endpoint:
    name: MCP endpoint
    description: Home Assistant MCP endpoint path.
  llm_provider:
    name: LLM provider
    description: OpenAI-compatible provider to use.
  llm_base_url:
    name: LLM base URL
    description: Base URL for the OpenAI-compatible API.
  llm_model:
    name: LLM model
    description: Model name to use for agent calls.
  llm_api_key:
    name: LLM API key
    description: API key for the configured LLM provider.
  llm_thinking_mode:
    name: LLM thinking mode
    description: auto keeps tool calls stable, disabled forces no thinking when supported, enabled allows provider defaults unless explicit enable is supported.
  state_database_path:
    name: State database path
    description: SQLite database path for persistent agent state.
  workspace_path:
    name: Workspace path
    description: Directory for files generated or read by the assistant.
  workspace_max_mb:
    name: Workspace size limit
    description: Maximum workspace size in MB.
  memory_retrieval_mode:
    name: Memory retrieval mode
    description: before_invoke injects recalled vector memory every turn; on_demand_tool exposes memory search as an explicit tool call.
  capsule_extraction_mode:
    name: Capsule extraction mode
    description: manual updates capsules only by command; auto-batched refreshes after enough new raw events.
  capsule_auto_batch_raw_event_threshold:
    name: Capsule auto-batch threshold
    description: Number of new raw events required before auto-batched capsule refresh starts.
