name: Home Assistant Personal Agent
version: "0.13.0"
slug: ha_personal_agent
description: Learning-first Microsoft Agent Framework assistant for Home Assistant.
url: https://github.com/MaxMinsk/home-assistan-personal-agent/tree/main/addon
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-happy-outline
panel_title: Personal Agent
image: ghcr.io/maxminsk/home-assistan-personal-agent
options:
  web_ui_enabled: true
  web_api_token: ""
  autonomous_agents_enabled: true
  autonomous_agent_run_timeout_minutes: 10
  autonomous_agent_max_concurrent_runs: 1
  autonomous_agent_catch_up_policy: "run_once"
  autonomous_agent_max_tool_calls: 20
  web_search_provider: "brave"
  web_search_api_key: ""
  web_search_max_results: 5
  web_search_country: ""
  telegram_bot_token: ""
  allowed_telegram_user_ids: ""
  reasoning_preview_enabled: false
  reasoning_preview_delay_seconds: 7
  ha_url: "http://supervisor/core"
  ha_long_lived_access_token: ""
  mcp_endpoint: "/api/mcp"
  llm_provider: "moonshot"
  llm_base_url: "https://api.moonshot.ai/v1"
  llm_model: "kimi-k2.6"
  llm_api_key: ""
  llm_thinking_mode: "auto"
  llm_router_mode: "enforced"
  llm_router_small_model: "moonshot-v1-8k"
  llm_router_max_input_chars_for_small: 1800
  llm_router_max_history_messages_for_small: 10
  llm_router_simple_max_input_chars: 6000
  llm_router_simple_max_history_messages: 6
  llm_router_simple_allow_tools: false
  llm_router_deep_keywords: "пошагово,step-by-step,deep reasoning"
  state_database_path: "/data/state.sqlite"
  workspace_path: "/data/workspace"
  workspace_max_mb: 512
  memory_retrieval_mode: "before_invoke"
  memory_mcp_endpoint: ""
  memory_mcp_token: ""
  memory_mcp_domain: "development"
  memory_mcp_project: "ha-personal-agent"
  memory_store_type: "sqlite"
schema:
  web_ui_enabled: bool
  web_api_token: password?
  autonomous_agents_enabled: bool
  autonomous_agent_run_timeout_minutes: int(1,120)
  autonomous_agent_max_concurrent_runs: int(1,8)
  autonomous_agent_catch_up_policy: list(run_once|skip)
  autonomous_agent_max_tool_calls: int(1,100)
  web_search_provider: list(brave)?
  web_search_api_key: password?
  web_search_max_results: int(1,20)?
  web_search_country: str?
  telegram_bot_token: password?
  allowed_telegram_user_ids: 'match(^\s*$|^\d+(\s*[,;\s]\s*\d+)*\s*$)'
  reasoning_preview_enabled: bool
  reasoning_preview_delay_seconds: int(1,30)
  ha_url: url
  ha_long_lived_access_token: password?
  mcp_endpoint: str
  llm_provider: list(moonshot|openai|openai-compatible)
  llm_base_url: url
  llm_model: str
  llm_api_key: password?
  llm_thinking_mode: list(auto|disabled|enabled)
  llm_router_mode: list(off|shadow|enforced)
  llm_router_small_model: str
  llm_router_max_input_chars_for_small: int(200,24000)
  llm_router_max_history_messages_for_small: int(2,64)
  llm_router_simple_max_input_chars: int(400,24000)?
  llm_router_simple_max_history_messages: int(2,64)?
  llm_router_simple_allow_tools: bool?
  llm_router_deep_keywords: str?
  state_database_path: str
  workspace_path: str
  workspace_max_mb: int(64,4096)
  memory_retrieval_mode: list(before_invoke|on_demand_tool)
  memory_mcp_endpoint: str?
  memory_mcp_token: password?
  memory_mcp_domain: str?
  memory_mcp_project: str?
  memory_store_type: list(sqlite|memory_mcp)?
