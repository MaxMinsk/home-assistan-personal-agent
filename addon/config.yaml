name: Home Assistant Personal Agent
version: "0.2.23"
slug: ha_personal_agent
description: Learning-first Microsoft Agent Framework assistant for Home Assistant.
url: https://github.com/MaxMinsk/home-assistan-personal-agent/tree/main/addon
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
homeassistant_api: true
image: ghcr.io/maxminsk/home-assistan-personal-agent
options:
  telegram_bot_token: ""
  allowed_telegram_user_ids: ""
  reasoning_preview_enabled: false
  reasoning_preview_delay_seconds: 7
  ha_url: "http://supervisor/core"
  ha_long_lived_access_token: ""
  mcp_endpoint: "/api/mcp"
  llm_provider: "moonshot"
  llm_base_url: "https://api.moonshot.ai/v1"
  llm_model: "kimi-k2.5"
  llm_api_key: ""
  llm_thinking_mode: "auto"
  llm_router_mode: "off"
  llm_router_small_model: "moonshot-v1-8k"
  llm_router_max_input_chars_for_small: 1800
  llm_router_max_history_messages_for_small: 10
  llm_router_deep_keywords: "пошагово,step-by-step,deep reasoning"
  state_database_path: "/data/state.sqlite"
  workspace_path: "/data/workspace"
  workspace_max_mb: 512
  memory_retrieval_mode: "before_invoke"
  capsule_extraction_mode: "manual"
  capsule_auto_batch_raw_event_threshold: 20
schema:
  telegram_bot_token: password?
  allowed_telegram_user_ids: 'match(^\s*$|^\d+(\s*[,;\s]\s*\d+)*\s*$)'
  reasoning_preview_enabled: bool
  reasoning_preview_delay_seconds: int(1,30)
  ha_url: url
  ha_long_lived_access_token: password?
  mcp_endpoint: str
  llm_provider: list(moonshot|openai|openai-compatible)
  llm_base_url: url
  llm_model: str
  llm_api_key: password?
  llm_thinking_mode: list(auto|disabled|enabled)
  llm_router_mode: list(off|shadow|enforced)
  llm_router_small_model: str
  llm_router_max_input_chars_for_small: int(200,24000)
  llm_router_max_history_messages_for_small: int(2,64)
  llm_router_deep_keywords: str?
  state_database_path: str
  workspace_path: str
  workspace_max_mb: int(64,4096)
  memory_retrieval_mode: list(before_invoke|on_demand_tool)
  capsule_extraction_mode: list(manual|auto-batched)
  capsule_auto_batch_raw_event_threshold: int(4,500)
