<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Agent</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f6f7f9;
      color: #1c1e21;
    }
    .card {
      width: min(560px, 92vw);
      background: #fff;
      border: 1px solid #e3e6ea;
      border-radius: 14px;
      padding: 28px 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,.06);
    }
    h1 { margin: 0 0 4px; font-size: 20px; }
    p.sub { margin: 0 0 20px; color: #6b7280; }
    .row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #9ca3af; flex: none; }
    .dot.ok { background: #16a34a; }
    .dot.err { background: #dc2626; }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    pre {
      margin: 16px 0 0;
      padding: 12px 14px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      overflow-x: auto;
    }
    .muted { color: #6b7280; font-size: 13px; margin-top: 18px; }
    @media (prefers-color-scheme: dark) {
      body { background: #0b0d10; color: #e5e7eb; }
      .card { background: #14171c; border-color: #262b32; box-shadow: none; }
      p.sub, .muted { color: #9aa4b2; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>🤖 Home Assistant Personal Agent</h1>
    <p class="sub">Веб-хост запущен (HPA-025). Полноценный интерфейс появится в HPA-027.</p>
    <div class="row"><span id="dot" class="dot"></span><span id="state">Проверяю /api/health…</span></div>
    <pre id="health">…</pre>
    <p class="muted">Этот плейсхолдер обслуживается встроенным ASP.NET Core за Home Assistant Ingress.</p>
  </main>
  <script>
    // Относительный путь работает и напрямую, и под ingress-префиксом (/api/hassio_ingress/&lt;token&gt;/).
    fetch('api/health', { headers: { Accept: 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        document.getElementById('dot').className = 'dot ok';
        document.getElementById('state').textContent =
          data.application + ' · v' + data.version;
        document.getElementById('health').textContent = JSON.stringify(data, null, 2);
      })
      .catch(function (err) {
        document.getElementById('dot').className = 'dot err';
        document.getElementById('state').textContent = 'health check failed';
        document.getElementById('health').textContent = String(err);
      });
  </script>
</body>
</html>
